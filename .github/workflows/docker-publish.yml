name: Publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/jampick/dungeon-grid
  DOCKERHUB_IMAGE: jampick/dungeon-grid

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_ENABLED == 'true' || secrets.DOCKERHUB_USERNAME != '' }}
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_SUBJECT=${{ github.event.head_commit.message }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Note: on first run, the ghcr.io image is published as PRIVATE by default.
# To make it public, visit https://github.com/jampick/dungeon-grid/pkgs/container/dungeon-grid
# and change the visibility in Package settings. This is a one-time manual step.
#
# Docker Hub publishing is gated on the DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets.
# Until those are set, the workflow still publishes to ghcr.io successfully.
