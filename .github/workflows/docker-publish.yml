name: Publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/jampick/dungeon-grid
  DOCKERHUB_IMAGE: jampick/dungeon-grid

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub publishing is gated by a repository variable so the
      # workflow-level `if:` doesn't need to reference secrets (which is
      # not allowed in Actions). To turn on Docker Hub publishing:
      #   1. Add secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
      #   2. Add repository variable DOCKERHUB_ENABLED=true
      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (ghcr.io)
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push to ghcr.io
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_SUBJECT=${{ github.event.head_commit.message }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Docker Hub)
        if: vars.DOCKERHUB_ENABLED == 'true'
        id: meta_dh
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push to Docker Hub
        if: vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_dh.outputs.tags }}
          labels: ${{ steps.meta_dh.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_SUBJECT=${{ github.event.head_commit.message }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Note: on first run, the ghcr.io image is published as PRIVATE by default.
# To make it public, visit https://github.com/jampick/dungeon-grid/pkgs/container/dungeon-grid
# and change the visibility in Package settings. This is a one-time manual step.
